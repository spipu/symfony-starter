# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # HTTPS configuration for CLI
    router.request_context.scheme: 'https'
    router.request_context.host: '%ENV_HOST%'
    asset.request_context.secure: true
    # Encryptor Configuration
    spipu.core.encryptor.key_pair: "%APP_SETTINGS_APP_ENCRYPTOR_KEY_PAIR%"

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/App/ available to be used as services
    App\:
        resource: '../src/App/'
        exclude:
            - '../src/App/Kernel.php'

    # Redis session handler
    app.session.redis.client:
        class: 'Predis\Client'
        arguments:
            - "%APP_SETTINGS_REDIS_SESSION_URL%"

    app.session.handler:
        class: Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler
        arguments:
            - '@app.session.redis.client'
            - prefix: 'smp_'

    # Application fixtures
    App\Fixture\:
        resource: '../src/App/Fixture/*'
        tags: ['spipu.fixture']

