security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        spipu_users:
            entity:
                class: Laurent\CoreBundle\Entity\AdminUser
                property: 'username'

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|build)/
            security: false

        admin:
            pattern:      ^/
            provider:     spipu_users
            user_checker: Spipu\UserBundle\Security\UserChecker
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            form_login:
                remember_me: true
                login_path: spipu_user_security_login
                check_path: spipu_user_security_login
                enable_csrf: true
                default_target_path: admin_home
            remember_me:
                secret: "%kernel.secret%"
                name: op_user_remember
                lifetime: 2592000 # 1 month
                httponly: true
            logout:
                path: spipu_user_security_logout
                target: admin_home

    access_control:
        # Admin
        - { path: ^/login,   roles: PUBLIC_ACCESS }
        - { path: ^/logout,  roles: PUBLIC_ACCESS }

        # Front
        - { path: ^/,       roles: PUBLIC_ACCESS }
